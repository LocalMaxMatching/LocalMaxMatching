<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 260">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <radialGradient id="glow-matched" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ef5350" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ef5350" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-unmatched" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#42a5f5" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#42a5f5" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="260" rx="16" fill="url(#bg)"/>

  <!-- Glows behind graph -->
  <ellipse cx="160" cy="130" rx="150" ry="110" fill="url(#glow-matched)"/>
  <ellipse cx="160" cy="130" rx="120" ry="90" fill="url(#glow-unmatched)"/>

  <!-- All edges (thin, dim) -->
  <g stroke="#42a5f5" stroke-width="1.2" opacity="0.25">
    <line x1="65" y1="65" x2="130" y2="48"/>
    <line x1="65" y1="65" x2="48" y2="130"/>
    <line x1="65" y1="65" x2="130" y2="115"/>
    <line x1="130" y1="48" x2="210" y2="52"/>
    <line x1="130" y1="48" x2="130" y2="115"/>
    <line x1="48" y1="130" x2="130" y2="115"/>
    <line x1="48" y1="130" x2="85" y2="190"/>
    <line x1="130" y1="115" x2="210" y2="52"/>
    <line x1="130" y1="115" x2="210" y2="130"/>
    <line x1="130" y1="115" x2="85" y2="190"/>
    <line x1="210" y1="52" x2="280" y2="75"/>
    <line x1="210" y1="52" x2="210" y2="130"/>
    <line x1="210" y1="130" x2="280" y2="75"/>
    <line x1="210" y1="130" x2="280" y2="160"/>
    <line x1="210" y1="130" x2="155" y2="195"/>
    <line x1="85" y1="190" x2="155" y2="195"/>
    <line x1="155" y1="195" x2="280" y2="160"/>
    <line x1="280" y1="75" x2="280" y2="160"/>
    <line x1="280" y1="160" x2="245" y2="210"/>
    <line x1="155" y1="195" x2="245" y2="210"/>
  </g>

  <!-- Matched edges (thick, bright red) -->
  <line x1="65" y1="65" x2="48" y2="130" stroke="#ef5350" stroke-width="3" opacity="0.8"/>
  <line x1="130" y1="48" x2="130" y2="115" stroke="#ef5350" stroke-width="3" opacity="0.8"/>
  <line x1="210" y1="52" x2="280" y2="75" stroke="#ef5350" stroke-width="3" opacity="0.8"/>
  <line x1="210" y1="130" x2="280" y2="160" stroke="#ef5350" stroke-width="3" opacity="0.8"/>
  <line x1="85" y1="190" x2="155" y2="195" stroke="#ef5350" stroke-width="3" opacity="0.8"/>

  <!-- Matched nodes (red) -->
  <circle cx="65" cy="65" r="8" fill="#ef5350"/>
  <circle cx="48" cy="130" r="8" fill="#ef5350"/>
  <circle cx="130" cy="48" r="8" fill="#ef5350"/>
  <circle cx="130" cy="115" r="8" fill="#ef5350"/>
  <circle cx="210" cy="52" r="8" fill="#ef5350"/>
  <circle cx="280" cy="75" r="8" fill="#ef5350"/>
  <circle cx="210" cy="130" r="8" fill="#ef5350"/>
  <circle cx="280" cy="160" r="8" fill="#ef5350"/>
  <circle cx="85" cy="190" r="8" fill="#ef5350"/>
  <circle cx="155" cy="195" r="8" fill="#ef5350"/>

  <!-- Unmatched nodes (blue) -->
  <circle cx="245" cy="210" r="7" fill="#42a5f5"/>

  <!-- Title: two lines -->
  <text x="380" y="100" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="60" font-weight="700" fill="#e0e0e0" letter-spacing="1">
    <tspan fill="#e0e0e0">Local</tspan><tspan fill="#ef5350">Max</tspan>
  </text>
  <text x="380" y="155" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="60" font-weight="700" fill="#e0e0e0" letter-spacing="1">
    Matching
  </text>

  <!-- Subtitle -->
  <text x="383" y="185" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="16" fill="#90a4ae" letter-spacing="1">
    Efficient Parallel and External Matching
  </text>

  <!-- Legend -->
  <line x1="385" y1="220" x2="405" y2="220" stroke="#ef5350" stroke-width="3" opacity="0.8"/>
  <circle cx="385" cy="220" r="5" fill="#ef5350"/>
  <circle cx="405" cy="220" r="5" fill="#ef5350"/>
  <text x="417" y="224" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#a0a0a0">Matched</text>

  <line x1="490" y1="220" x2="510" y2="220" stroke="#42a5f5" stroke-width="1.2" opacity="0.4"/>
  <circle cx="490" cy="220" r="4" fill="#42a5f5"/>
  <circle cx="510" cy="220" r="4" fill="#42a5f5"/>
  <text x="522" y="224" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#a0a0a0">Unmatched</text>

  <text x="610" y="224" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#a0a0a0">1/2-approx  &#183;  linear work  &#183;  MPI</text>
</svg>
