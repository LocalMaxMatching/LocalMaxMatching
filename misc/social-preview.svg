<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <radialGradient id="glow-matched" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ef5350" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ef5350" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-unmatched" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#42a5f5" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#42a5f5" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Glows -->
  <ellipse cx="280" cy="320" rx="280" ry="250" fill="url(#glow-matched)"/>
  <ellipse cx="280" cy="320" rx="220" ry="200" fill="url(#glow-unmatched)"/>

  <!-- All edges (thin, dim) -->
  <g stroke="#42a5f5" stroke-width="1.8" opacity="0.25">
    <line x1="110" y1="140" x2="210" y2="110"/>
    <line x1="110" y1="140" x2="80" y2="260"/>
    <line x1="110" y1="140" x2="210" y2="240"/>
    <line x1="210" y1="110" x2="340" y2="115"/>
    <line x1="210" y1="110" x2="210" y2="240"/>
    <line x1="80" y1="260" x2="210" y2="240"/>
    <line x1="80" y1="260" x2="140" y2="390"/>
    <line x1="210" y1="240" x2="340" y2="115"/>
    <line x1="210" y1="240" x2="340" y2="270"/>
    <line x1="210" y1="240" x2="140" y2="390"/>
    <line x1="340" y1="115" x2="440" y2="160"/>
    <line x1="340" y1="115" x2="340" y2="270"/>
    <line x1="340" y1="270" x2="440" y2="160"/>
    <line x1="340" y1="270" x2="440" y2="340"/>
    <line x1="340" y1="270" x2="250" y2="410"/>
    <line x1="140" y1="390" x2="250" y2="410"/>
    <line x1="250" y1="410" x2="440" y2="340"/>
    <line x1="440" y1="160" x2="440" y2="340"/>
    <line x1="440" y1="340" x2="380" y2="480"/>
    <line x1="250" y1="410" x2="380" y2="480"/>
    <line x1="140" y1="390" x2="180" y2="510"/>
    <line x1="250" y1="410" x2="180" y2="510"/>
    <line x1="380" y1="480" x2="180" y2="510"/>
  </g>

  <!-- Matched edges (thick, bright red) -->
  <line x1="110" y1="140" x2="80" y2="260" stroke="#ef5350" stroke-width="4.5" opacity="0.85"/>
  <line x1="210" y1="110" x2="210" y2="240" stroke="#ef5350" stroke-width="4.5" opacity="0.85"/>
  <line x1="340" y1="115" x2="440" y2="160" stroke="#ef5350" stroke-width="4.5" opacity="0.85"/>
  <line x1="340" y1="270" x2="440" y2="340" stroke="#ef5350" stroke-width="4.5" opacity="0.85"/>
  <line x1="140" y1="390" x2="250" y2="410" stroke="#ef5350" stroke-width="4.5" opacity="0.85"/>
  <line x1="380" y1="480" x2="180" y2="510" stroke="#ef5350" stroke-width="4.5" opacity="0.85"/>

  <!-- Matched nodes (red) -->
  <circle cx="110" cy="140" r="12" fill="#ef5350"/>
  <circle cx="80" cy="260" r="12" fill="#ef5350"/>
  <circle cx="210" cy="110" r="12" fill="#ef5350"/>
  <circle cx="210" cy="240" r="12" fill="#ef5350"/>
  <circle cx="340" cy="115" r="12" fill="#ef5350"/>
  <circle cx="440" cy="160" r="12" fill="#ef5350"/>
  <circle cx="340" cy="270" r="12" fill="#ef5350"/>
  <circle cx="440" cy="340" r="12" fill="#ef5350"/>
  <circle cx="140" cy="390" r="12" fill="#ef5350"/>
  <circle cx="250" cy="410" r="12" fill="#ef5350"/>
  <circle cx="380" cy="480" r="12" fill="#ef5350"/>
  <circle cx="180" cy="510" r="12" fill="#ef5350"/>

  <!-- Title -->
  <text x="600" y="240" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="90" font-weight="700" fill="#e0e0e0" letter-spacing="1">
    <tspan fill="#e0e0e0">Local</tspan><tspan fill="#ef5350">Max</tspan>
  </text>
  <text x="600" y="330" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="90" font-weight="700" fill="#e0e0e0" letter-spacing="1">
    Matching
  </text>

  <!-- Subtitle -->
  <text x="605" y="380" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="26" fill="#90a4ae" letter-spacing="1.5">
    Efficient Parallel and External Matching
  </text>

  <!-- Info line -->
  <text x="605" y="430" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="20" fill="#607090" letter-spacing="1">
    1/2-approximation  &#183;  linear work  &#183;  O(log&#178; n) parallel time  &#183;  MPI
  </text>

  <!-- Legend -->
  <g transform="translate(605, 490)">
    <line x1="0" y1="0" x2="30" y2="0" stroke="#ef5350" stroke-width="4" opacity="0.85"/>
    <circle cx="0" cy="0" r="7" fill="#ef5350"/>
    <circle cx="30" cy="0" r="7" fill="#ef5350"/>
    <text x="45" y="5" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="16" fill="#a0a0a0">Matched</text>

    <line x1="150" y1="0" x2="180" y2="0" stroke="#42a5f5" stroke-width="1.5" opacity="0.4"/>
    <circle cx="150" cy="0" r="5" fill="#42a5f5"/>
    <circle cx="180" cy="0" r="5" fill="#42a5f5"/>
    <text x="195" y="5" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="16" fill="#a0a0a0">Unmatched</text>
  </g>
</svg>
